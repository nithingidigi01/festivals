name: Festival Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # daily 3 AM

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright bs4 lxml
          playwright install --with-deps

      - name: Run scraper
        run: python festivals.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add hindu_festivals_2026_full.json
          git commit -m "Update festival data" || echo "No changes"
          git push
